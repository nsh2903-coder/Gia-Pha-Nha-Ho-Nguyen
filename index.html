<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Họ Nguyễn - Quản Lý Đồng Bộ</title>
    <style>
        :root { --primary: #8b0000; --gold: #d4af37; --bg: #fdfaf1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        header { text-align: center; border-bottom: 3px double var(--gold); margin-bottom: 30px; padding: 10px; }
        
        /* Cấu trúc cây gia phả */
        .tree-container { overflow-x: auto; background: white; border: 1px solid var(--gold); border-radius: 8px; padding: 40px 20px; min-height: 600px;}
        .tree ul { display: flex; justify-content: center; position: relative; padding-top: 20px; transition: all 0.5s; padding-left: 0;}
        .tree li { list-style-type: none; position: relative; padding: 20px 5px 0 5px; text-align: center; }
        
        /* Đường kẻ nối */
        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid var(--gold); width: 50%; height: 20px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--gold); }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid var(--gold); border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid var(--gold); width: 0; height: 20px; }

        /* Thẻ thành viên */
        .member-card { border: 2px solid var(--gold); padding: 15px 10px; border-radius: 8px; background: #f4e4bc; min-width: 180px; display: inline-block; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .name { font-weight: bold; color: var(--primary); display: block; font-size: 1.1em; margin-bottom: 5px;}
        .spouse { font-size: 0.85em; color: #555; font-style: italic; display: block; margin-bottom: 5px;}
        .birth { font-size: 0.8em; color: #666; margin-bottom: 10px; }
        
        /* Cụm nút thao tác */
        .controls { margin-top: 10px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        button { border: none; padding: 6px 10px; border-radius: 4px; font-size: 0.75em; cursor: pointer; color: white; transition: 0.2s; font-weight: bold;}
        .btn-edit { background: #007bff; }
        .btn-child { background: #28a745; }
        .btn-sibling { background: #fd7e14; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Khung Modal (Popup) */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-content h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-form { display: flex; flex-direction: column; gap: 12px; }
        .modal-form input, .modal-form select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em;}
        .btn-submit { background: var(--primary); padding: 12px; font-weight: bold; font-size: 1em;}
    </style>
</head>
<body>

<header>
    <h1>Gia Phả Họ Nguyễn</h1>
    <p>Hệ Thống Quản Lý Đồng Bộ Thời Gian Thực</p>
</header>

<div class="tree-container">
    <div id="familyTree" class="tree">
        <p id="loadingMsg" style="font-style: italic; color: #888;">Đang tải dữ liệu từ server...</p>
    </div>
</div>

<div id="memberModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Thông tin thành viên</h3>
        <form id="memberForm" class="modal-form">
            <input type="hidden" id="m_id">
            <input type="hidden" id="m_parentId">
            
            <input type="text" id="m_name" placeholder="Họ và Tên (*)" required>
            <select id="m_gender">
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
            </select>
            <input type="text" id="m_spouse" placeholder="Họ tên Vợ/Chồng (nếu có)">
            <input type="text" id="m_birth" placeholder="Năm sinh">
            
            <button type="submit" class="btn-submit" id="submitBtn">LƯU THÔNG TIN</button>
            <button type="button" onclick="closeModal()" style="background:#666">HỦY</button>
        </form>
        <div id="status" style="text-align:center; margin-top:10px; font-size:0.9em; font-weight: bold;"></div>
    </div>
</div>

<script>
    // Link của bạn đã được tích hợp
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0bWo6KzNPewqS7Bhmt8qW9vmgVRiXP9CrkzvWYa9nmY8byqHf6pTqGv0cTu24Cfz_lQ/exec";
    let fullData = [];

    // Tải dữ liệu
    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            fullData = await response.json();
            renderTree(fullData);
        } catch (e) { 
            document.getElementById('loadingMsg').innerText = "Lỗi kết nối dữ liệu. Vui lòng thử tải lại trang."; 
        }
    }

    // Vẽ sơ đồ cây
    function renderTree(data) {
        const container = document.getElementById('familyTree');
        container.innerHTML = '';
        
        // Tìm người gốc
        const root = data.find(m => m.parentId == 0 || m.parentId === "");
        if (!root) {
            container.innerHTML = "<p>Dữ liệu trống hoặc không tìm thấy người khởi tổ.</p>";
            return;
        }

        // Đệ quy vẽ nhánh
        const getChildren = (id) => {
            const children = data.filter(m => m.parentId == id);
            if (!children.length) return '';
            return `<ul>${children.map(c => `<li>${renderCard(c)}${getChildren(c.id)}</li>`).join('')}</ul>`;
        };

        container.innerHTML = `<ul><li>${renderCard(root)}${getChildren(root.id)}</li></ul>`;
    }

    // Tạo HTML cho từng thẻ thành viên
    function renderCard(m) {
        return `
            <div class="member-card">
                <span class="name">${m.name}</span>
                <span class="spouse">${m.spouse ? '❤️ '+m.spouse : ''}</span>
                <div class="birth">Sinh: ${m.birth || '...'}</div>
                <div class="controls">
                    <button class="btn-edit" onclick="openEdit(${m.id})">Sửa</button>
                    <button class="btn-child" onclick="openAdd(${m.id}, 'child', '${m.name}')">+ Con</button>
                    <button class="btn-sibling" onclick="openAdd(${m.parentId}, 'sibling', '')">+ Chi ngang</button>
                </div>
            </div>`;
    }

    // Mở popup để Sửa
    function openEdit(id) {
        const m = fullData.find(x => x.id == id);
        document.getElementById('modalTitle').innerText = "Sửa thông tin: " + m.name;
        document.getElementById('m_id').value = m.id;
        document.getElementById('m_parentId').value = m.parentId;
        document.getElementById('m_name').value = m.name;
        document.getElementById('m_gender').value = m.gender || 'Nam';
        document.getElementById('m_spouse').value = m.spouse || '';
        document.getElementById('m_birth').value = m.birth || '';
        
        document.getElementById('status').innerText = "";
        document.getElementById('memberModal').style.display = 'flex';
    }

    // Mở popup để Thêm (Con hoặc Chi ngang)
    function openAdd(pId, type, parentName) {
        document.getElementById('modalTitle').innerText = type === 'child' ? "Thêm con cho: " + parentName : "Thêm chi hàng ngang";
        document.getElementById('memberForm').reset(); // Xóa trắng form
        
        document.getElementById('m_id').value = ""; // Để trống ID để hệ thống biết là THÊM MỚI
        document.getElementById('m_parentId').value = pId; // Gắn ID người cha/mẹ
        
        document.getElementById('status').innerText = "";
        document.getElementById('memberModal').style.display = 'flex';
    }

    // Đóng popup
    function closeModal() { 
        document.getElementById('memberModal').style.display = 'none'; 
    }

    // Gửi dữ liệu đi
    document.getElementById('memberForm').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "ĐANG XỬ LÝ...";
        status.innerText = "Đang đồng bộ với cơ sở dữ liệu...";
        status.style.color = "#000";
        
        const payload = {
            id: document.getElementById('m_id').value,
            parentId: document.getElementById('m_parentId').value,
            name: document.getElementById('m_name').value,
            gender: document.getElementById('m_gender').value,
            spouse: document.getElementById('m_spouse').value,
            birth: document.getElementById('m_birth').value
        };

        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload) 
            });
            
            status.innerText = "Cập nhật thành công! Đang tải lại sơ đồ...";
            status.style.color = "green";
            
            // Đợi 2.5 giây để Google Sheet lưu xong rồi tải lại
            setTimeout(() => { 
                closeModal(); 
                loadData(); 
                submitBtn.disabled = false;
                submitBtn.innerText = "LƯU THÔNG TIN";
            }, 2500);
            
        } catch (e) { 
            status.innerText = "Có lỗi xảy ra, vui lòng thử lại!"; 
            status.style.color = "red";
            submitBtn.disabled = false;
            submitBtn.innerText = "LƯU THÔNG TIN";
        }
    };

    // Chạy tải dữ liệu khi vừa mở web
    loadData();
</script>
</body>
</html>
