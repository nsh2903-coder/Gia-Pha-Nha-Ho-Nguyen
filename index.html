<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Họ Nguyễn - Website Quản Lý Dòng Họ</title>
    <style>
        :root {
            --primary-color: #8b0000;
            --secondary-color: #f4e4bc;
            --text-color: #333;
            --border-color: #d4af37;
            --btn-hover: #a00000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf1;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        header {
            text-align: center;
            padding: 20px;
            border-bottom: 3px double var(--border-color);
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .tree-container {
            overflow-x: auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            min-height: 500px;
        }

        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree ul {
            padding-top: 20px; 
            position: relative;
            transition: all 0.5s;
            display: flex;
            justify-content: center;
            padding-left: 0;
        }

        .tree li {
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 20px 10px 0 10px;
            transition: all 0.5s;
        }

        .tree li::before, .tree li::after{
            content: '';
            position: absolute; top: 0; right: 50%;
            border-top: 2px solid var(--border-color);
            width: 50%; height: 20px;
        }
        .tree li::after{
            right: auto; left: 50%;
            border-left: 2px solid var(--border-color);
        }

        .tree li:only-child::after, .tree li:only-child::before {
            display: none;
        }

        .tree li:only-child{ padding-top: 0;}
        .tree li:first-child::before, .tree li:last-child::after{
            border: 0 none;
        }
        .tree li:last-child::before{
            border-right: 2px solid var(--border-color);
            border-radius: 0 5px 0 0;
        }
        .tree li:first-child::after{
            border-radius: 5px 0 0 0;
        }

        .tree ul ul::before{
            content: '';
            position: absolute; top: 0; left: 50%;
            border-left: 2px solid var(--border-color);
            width: 0; height: 20px;
        }

        .member-card {
            border: 2px solid var(--border-color);
            padding: 15px 10px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            border-radius: 8px;
            background-color: var(--secondary-color);
            min-width: 160px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
            transition: transform 0.2s;
        }

        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .member-card .name {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .member-card .spouse {
            font-size: 0.9em;
            color: #555;
            font-style: italic;
            margin-bottom: 5px;
        }

        .member-card .info {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 10px;
        }

        .add-branch-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 0.8em;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: auto;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-form input, .modal-form select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        #statusMsg {
            text-align: center;
            font-size: 0.9em;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Gia Phả Họ Nguyễn</h1>
    <p>Gìn giữ cội nguồn - Phát huy truyền thống</p>
</header>

<div class="container" style="max-width: 1400px; margin: auto;">
    <div class="tree-container">
        <div id="familyTree" class="tree">
            <p id="loadingText" style="font-style: italic; color: #888;">Đang kết nối tới dữ liệu dòng họ...</p>
        </div>
    </div>
</div>

<div id="inputModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Thêm thành viên</h3>
        <form id="addMemberForm" class="modal-form">
            <input type="hidden" id="parentID" required>
            <input type="text" id="newName" placeholder="Họ và Tên (*)" required>
            <select id="newGender">
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
            </select>
            <input type="text" id="newSpouse" placeholder="Họ tên Vợ/Chồng (nếu có)">
            <input type="text" id="newBirth" placeholder="Ngày/Năm sinh">
            <button type="submit" class="submit-btn" id="submitBtn">Lưu vào gia phả</button>
        </form>
        <div id="statusMsg"></div>
    </div>
</div>

<script>
    // LINK APPS SCRIPT CỦA BẠN ĐÃ ĐƯỢC CHÈN TẠI ĐÂY
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0bWo6KzNPewqS7Bhmt8qW9vmgVRiXP9CrkzvWYa9nmY8byqHf6pTqGv0cTu24Cfz_lQ/exec";

    const treeContainer = document.getElementById('familyTree');
    const modal = document.getElementById('inputModal');
    const form = document.getElementById('addMemberForm');
    const statusMsg = document.getElementById('statusMsg');

    function renderTree(data) {
        treeContainer.innerHTML = '';
        const root = data.find(m => m.parentId == 0 || m.parentId === "");
        if (!root) {
            treeContainer.innerHTML = '<p>Dữ liệu trống hoặc lỗi cấu hình Google Sheet.</p>';
            return;
        }

        const buildList = (parentId) => {
            const children = data.filter(m => m.parentId == parentId);
            if (children.length === 0) return '';
            let html = '<ul>';
            children.forEach(child => {
                html += `<li>
                    <div class="member-card">
                        <span class="name">${child.name}</span>
                        ${child.spouse ? `<span class="spouse">❤️ ${child.spouse}</span>` : ''}
                        <div class="info">Sinh: ${child.birth || '...'}</div>
                        <button class="add-branch-btn" onclick="openModal(${child.id}, '${child.name}')">+ Thêm con</button>
                    </div>
                    ${buildList(child.id)}
                </li>`;
            });
            html += '</ul>';
            return html;
        };

        treeContainer.innerHTML = `<ul>
            <li>
                <div class="member-card">
                    <span class="name">${root.name}</span>
                    ${root.spouse ? `<span class="spouse">❤️ ${root.spouse}</span>` : ''}
                    <div class="info">Sinh: ${root.birth || '...'}</div>
                    <button class="add-branch-btn" onclick="openModal(${root.id}, '${root.name}')">+ Thêm con</button>
                </div>
                ${buildList(root.id)}
            </li>
        </ul>`;
    }

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            renderTree(data);
        } catch (e) {
            console.error(e);
            document.getElementById('loadingText').innerText = "Lỗi tải dữ liệu. Hãy đảm bảo bạn đã 'Triển khai' Apps Script ở chế độ 'Anyone'.";
        }
    }

    function openModal(parentId, parentName) {
        document.getElementById('parentID').value = parentId;
        document.getElementById('modalTitle').innerText = "Thêm con cho: " + parentName;
        modal.style.display = 'flex';
        statusMsg.innerText = '';
        statusMsg.style.color = 'black';
    }

    function closeModal() {
        modal.style.display = 'none';
        form.reset();
    }

    window.onclick = function(event) { if (event.target == modal) closeModal(); }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "Đang lưu...";
        submitBtn.disabled = true;

        const newMember = {
            name: document.getElementById('newName').value,
            gender: document.getElementById('newGender').value,
            spouse: document.getElementById('newSpouse').value,
            parentId: document.getElementById('parentID').value,
            birth: document.getElementById('newBirth').value
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(newMember)
            });
            
            statusMsg.innerText = "Đã gửi yêu cầu! Sơ đồ sẽ cập nhật sau vài giây...";
            statusMsg.style.color = "green";
            
            setTimeout(() => {
                closeModal();
                loadData();
                submitBtn.innerText = "Lưu vào gia phả";
                submitBtn.disabled = false;
            }, 3000);

        } catch (e) {
            statusMsg.innerText = "Lỗi gửi dữ liệu!";
            statusMsg.style.color = "red";
            submitBtn.disabled = false;
        }
    });

    loadData();
</script>
</body>
</html>
